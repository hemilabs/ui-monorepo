enum RequestKind {
  DEPOSIT
  REDEEM
}

enum RequestStatus {
  PENDING
  FULFILLED
  CLAIMED
  CANCELLED
  RECOVERED
}

type Request @entity(immutable: false) {
  id: ID!
  requestId: BigInt!
  kind: RequestKind!
  asset: Bytes!
  amountIn: BigInt!
  amountOut: BigInt
  receiver: Bytes!
  automatic: Boolean!
  initiatedAt: BigInt!
  status: RequestStatus!
  initiateTxHash: Bytes!
  claimTxHash: Bytes
  recoverTxHash: Bytes
}
