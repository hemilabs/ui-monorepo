specVersion: 1.0.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: HemiBTCVault
    network: hemi
    source:
      abi: ERC4626Vault
      address: '0xC95873B97E28FFfC9230A335cE193D8D7f09e523' # Test contract
      startBlock: 4212294
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - VaultHistory
      abis:
        - name: ERC4626Vault
          file: ./abis/ERC4626Vault.json
      blockHandlers:
        - handler: handleBlock
      file: ./src/mappings/vault.ts
  - kind: ethereum
    name: USDCVault
    network: hemi
    source:
      abi: ERC4626Vault
      address: '0xC95873B97E28FFfC9230A335cE193D8D7f09e523' # Test contract
      startBlock: 4212294
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - VaultHistory
      abis:
        - name: ERC4626Vault
          file: ./abis/ERC4626Vault.json
      blockHandlers:
        - handler: handleBlock
      file: ./src/mappings/vault.ts
