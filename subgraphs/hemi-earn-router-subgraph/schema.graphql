enum RequestKind {
  DEPOSIT
  REDEEM
}

enum RequestStatus {
  PENDING
  FULFILLED
  CLAIMED
  CANCELLED
  RECOVERED
}

type Request @entity(immutable: false) {
  id: ID!
  requestId: BigInt!
  kind: RequestKind!
  asset: Bytes!
  amountIn: BigInt!
  amountOut: BigInt
  amountOutMin: BigInt!
  receiver: Bytes!
  automatic: Boolean!
  initiatedAt: BigInt!
  status: RequestStatus!
  initiateTxHash: Bytes!
  claimTxHash: Bytes
  recoverTxHash: Bytes
  # Timestamp of the most recent `CancellationRequested` event for this
  # request (set by `Router.cancel()` while still PENDING). Diagnostic only —
  # status stays PENDING until the keeper-driven Agent.cancel returns shares
  # and the Router transitions to CANCELLED.
  cancellationRequestedAt: BigInt
}
