name: Docker Checks

on:
  pull_request:
    paths:
      # portal-backend/api bundles these workspace packages into its image via
      # `pnpm deploy`, so changes to them must re-run its checks. Ideally this
      # would be dependency-aware via `pnpm --filter "...[ref]"`, but that needs
      # a dynamic-matrix rework — tracked for a future PR/issue.
      - 'packages/ve-hemi-actions/**'
      - 'packages/ve-hemi-rewards/**'
      - 'portal-backend/**'
      - 'subgraph-api/**'
  push:
    paths:
      - 'packages/ve-hemi-actions/**'
      - 'packages/ve-hemi-rewards/**'
      - 'portal-backend/**'
      - 'subgraph-api/**'

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  docker-checks:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: docker build --tag ${{ matrix.image }}:local ${{ matrix.dockerfile && format('-f {0} ', matrix.dockerfile) || '' }}${{ matrix.context }}
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
      - uses: docker/scout-action@8910519cee8ac046f3ee99686b0dc6654d5ba1a7 # v1.20.3
        with:
          command: cves
          exit-code: true
          image: ${{ matrix.image }}:local
          only-severities: critical,high
          vex-author: '.*'
          vex-location: '.'
    strategy:
      matrix:
        include:
          - context: .
            dockerfile: portal-backend/api/Dockerfile
            image: hemilabs/portal-backend-api
          - context: portal-backend/cron/hemi-supply
            image: hemilabs/hemi-supply-cron
          - context: portal-backend/cron/token-prices
            image: hemilabs/token-prices-cron
          - context: portal-backend/cron/vaults-monitor
            image: hemilabs/vaults-monitor-cron
          - context: subgraph-api
            image: hemilabs/subgraph-api
